<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faster - Super Admin Delivery Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

    <header class="bg-orange-600 p-4 text-white shadow-md flex justify-between items-center shrink-0">
        <div class="flex items-center gap-3">
            <i class="fas fa-layer-group text-xl"></i>
            <h1 class="font-black tracking-wide uppercase text-sm">Faster Multi-Tenant Matrix</h1>
        </div>
        <span class="text-[10px] bg-orange-700 font-bold px-3 py-1 rounded-full uppercase tracking-widest">Vendor & Area Control</span>
    </header>

    <main class="flex-1 p-4 max-w-6xl w-full mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="md:col-span-1 bg-white p-5 rounded-2xl shadow-sm border border-gray-100 h-fit">
            <h2 class="font-extrabold text-gray-900 text-base mb-4 flex items-center gap-2">
                <i class="fas fa-sliders text-orange-500"></i> Configure Charges
            </h2>
            
            <form id="matrixForm" onsubmit="saveMatrixRate(event)" class="flex flex-col gap-4">
                <div>
                    <label class="text-xs font-black uppercase text-gray-500 tracking-wider block mb-1">Rate Type</label>
                    <select id="rateType" onchange="toggleVendorField()" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none bg-gray-50 font-semibold">
                        <option value="standard">Standard (For Regular Customers)</option>
                        <option value="vendor">Vendor Specific Override</option>
                    </select>
                </div>

                <div id="vendorPhoneWrapper" class="hidden">
                    <label class="text-xs font-black uppercase text-gray-500 tracking-wider block mb-1">Vendor Phone Number</label>
                    <input type="text" id="vendorPhoneInput" placeholder="e.g., 03001234567"
                        class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none focus:border-orange-500 bg-gray-50">
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-xs font-black uppercase text-gray-500 tracking-wider block mb-1">Area</label>
                        <input type="text" id="areaInput" placeholder="Bahria Town" required class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none focus:border-orange-500 bg-gray-50">
                    </div>
                    <div>
                        <label class="text-xs font-black uppercase text-gray-500 tracking-wider block mb-1">Block / Sector</label>
                        <input type="text" id="blockInput" placeholder="Block C" required class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none focus:border-orange-500 bg-gray-50">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-xs font-black uppercase text-gray-500 tracking-wider block mb-1 font-bold text-orange-600">Charges (Rs.)</label>
                        <input type="number" id="feeInput" placeholder="150" required min="0" class="w-full border border-orange-200 rounded-xl px-3 py-2 text-sm outline-none focus:border-orange-500 bg-orange-50/30 font-bold text-orange-700">
                    </div>
                    <div>
                        <label class="text-xs font-black uppercase text-gray-500 tracking-wider block mb-1">Status</label>
                        <select id="statusInput" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none bg-gray-50">
                            <option value="true">Active</option>
                            <option value="false">Inactive</option>
                        </select>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-2.5 rounded-xl text-sm shadow-sm uppercase tracking-wider mt-2 flex items-center justify-center gap-2">
                    <i class="fas fa-save"></i> Save Configuration
                </button>
            </form>
        </div>

        <div class="md:col-span-2 bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-extrabold text-gray-900 text-base flex items-center gap-2">
                    <i class="fas fa-table text-orange-500"></i> Rate Assignment Logs
                </h2>
                <input type="text" id="searchBar" oninput="filterRates()" placeholder="Search Area/Vendor..." class="border border-gray-200 rounded-lg px-3 py-1 text-xs outline-none focus:border-orange-500 w-48">
            </div>

            <div class="flex-1 overflow-y-auto max-h-[70vh] border rounded-xl border-gray-100">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-[10px] font-black uppercase tracking-wider text-gray-400 border-b border-gray-100">
                            <th class="p-3">Target / Scope</th>
                            <th class="p-3">Area (Block)</th>
                            <th class="p-3">Charges</th>
                            <th class="p-3">Status</th>
                            <th class="p-3 text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="matrixTableBody" class="text-sm divide-y divide-gray-50">
                        <tr><td colspan="5" class="p-6 text-center text-gray-400">Loading Configuration Engine...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = "https://hkabhikizdlbavfkualt.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrYWJoaWtpemRsYmF2Zmt1YWx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODgyMjUsImV4cCI6MjA5MjA2NDIyNX0.iMlS6-M1aylW8K915LPYDHOg7qUxwu5GelH_CPHLP2U";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        let matrixData = [];

        function toggleVendorField() {
            const isVendor = document.getElementById('rateType').value === 'vendor';
            document.getElementById('vendorPhoneWrapper').classList.toggle('hidden', !isVendor);
            document.getElementById('vendorPhoneInput').required = isVendor;
        }

        async function loadMatrix() {
            try {
                const { data, error } = await _supabase.from('delivery_rates').select('*').order('vendor_phone', { nullsFirst: true });
                if (error) throw error;
                matrixData = data;
                renderTable(matrixData);
            } catch (err) { alert(err.message); }
        }

        function renderTable(list) {
            const tbody = document.getElementById('matrixTableBody');
            if (list.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-6 text-center text-gray-400">No active matrix configs.</td></tr>`;
                return;
            }
            tbody.innerHTML = list.map(row => `
                <tr class="hover:bg-gray-50/80">
                    <td class="p-3">
                        ${row.vendor_phone 
                            ? `<span class="bg-blue-100 text-blue-800 font-bold px-2 py-0.5 rounded text-xs"><i class="fas fa-store mr-1"></i> ${row.vendor_phone}</span>` 
                            : `<span class="bg-gray-100 text-gray-600 font-semibold px-2 py-0.5 rounded text-xs"><i class="fas fa-users mr-1"></i> Public</span>`}
                    </td>
                    <td class="p-3 font-bold text-gray-900">${row.area} <span class="text-xs font-normal text-gray-500">(${row.block})</span></td>
                    <td class="p-3 text-orange-600 font-black">Rs. ${row.delivery_fee}</td>
                    <td class="p-3">${row.is_active ? '<span class="text-green-600 font-bold text-xs">Active</span>' : '<span class="text-red-500 font-bold text-xs">Disabled</span>'}</td>
                    <td class="p-3 text-center"><button onclick="deleteRate(${row.id})" class="text-red-500 hover:text-red-700"><i class="fas fa-trash-can"></i></button></td>
                </tr>`).join('');
        }

        async function saveMatrixRate(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const isVendor = document.getElementById('rateType').value === 'vendor';
            
            const payload = {
                area: document.getElementById('areaInput').value.trim(),
                block: document.getElementById('blockInput').value.trim(),
                delivery_fee: parseFloat(document.getElementById('feeInput').value),
                is_active: document.getElementById('statusInput').value === "true",
                vendor_phone: isVendor ? document.getElementById('vendorPhoneInput').value.trim() : null
            };

            btn.disabled = true;
            try {
                const { error } = await _supabase.from('delivery_rates').upsert([payload], { onConflict: 'vendor_phone,area,block' });
                if (error) throw error;
                document.getElementById('matrixForm').reset();
                toggleVendorField();
                loadMatrix();
                alert("Matrix configured perfectly! 🎯");
            } catch (err) { alert(err.message); }
            finally { btn.disabled = false; btn.innerHTML = `<i class="fas fa-save"></i> Save Configuration`; }
        }

        async function deleteRate(id) {
            if(confirm("Delete entry?")) {
                await _supabase.from('delivery_rates').delete().eq('id', id);
                loadMatrix();
            }
        }

        function filterRates() {
            const q = document.getElementById('searchBar').value.toLowerCase();
            renderTable(matrixData.filter(r => r.area.toLowerCase().includes(q) || r.block.toLowerCase().includes(q) || (r.vendor_phone && r.vendor_phone.includes(q))));
        }

        loadMatrix();
    </script>
</body>
</html>
