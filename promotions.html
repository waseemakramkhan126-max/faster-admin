<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faster Admin - Dark Promotions Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root {
            --bg-color: #1a1c23;      /* Deep Dark */
            --neo-dark: #121318;      /* Shadow Dark */
            --neo-light: #22252e;     /* Shadow Light */
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-color); 
            color: #9ca3af; 
        }

        /* NEOMORPHISM CLASSES */
        .neo-card {
            background: var(--bg-color);
            border-radius: 20px;
            box-shadow: 8px 8px 16px var(--neo-dark), -8px -8px 16px var(--neo-light);
        }
        
        .neo-button {
            background: var(--bg-color);
            border-radius: 12px;
            box-shadow: 4px 4px 8px var(--neo-dark), -4px -4px 8px var(--neo-light);
            transition: all 0.2s ease;
        }
        .neo-button:active {
            box-shadow: inset 4px 4px 8px var(--neo-dark), inset -4px -4px 8px var(--neo-light);
        }

        .neo-inset {
            background: var(--bg-color);
            border-radius: 12px;
            box-shadow: inset 4px 4px 8px var(--neo-dark), inset -4px -4px 8px var(--neo-light);
        }

        /* GLASSMORPHISM CLASSES */
        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* GLOW & SCROLLBAR */
        .accent-glow { box-shadow: 0 0 15px rgba(34, 197, 94, 0.4); }
        .text-glow { color: white; text-shadow: 0 0 10px rgba(34, 197, 94, 0.3); }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        
        /* Hide number input arrows */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <div id="detailsModal" class="modal" onclick="if(event.target == this) closeModal()">
        <div class="neo-card p-6 w-full max-w-md relative border border-gray-800">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-500 hover:text-red-500 transition-colors"><i class="fas fa-times-circle text-xl"></i></button>
            <h2 class="text-lg font-black text-white mb-4 flex items-center gap-2"><i class="fas fa-edit text-green-500"></i> Edit Details</h2>
            
            <div id="modalContent" class="space-y-3 text-xs font-bold text-gray-400"></div>

            <div class="mt-5 pt-5 border-t border-gray-800">
                <label class="block text-[9px] font-black text-green-500 uppercase tracking-widest mb-2">Update Schedule & Payment</label>
                <div class="flex gap-2">
                    <input type="datetime-local" id="new_expiry_date" class="flex-1 p-2.5 rounded-lg neo-inset text-gray-300 text-xs font-bold outline-none border border-transparent focus:border-green-500/50 bg-transparent" title="Expiry Date">
                    <input type="number" id="new_duration" placeholder="Secs" class="w-16 p-2.5 rounded-lg neo-inset text-gray-300 text-xs font-bold outline-none border border-transparent focus:border-green-500/50 bg-transparent" title="Duration">
                    <input type="number" id="new_payment" placeholder="PKR" class="w-20 p-2.5 rounded-lg neo-inset text-gray-300 text-xs font-bold outline-none border border-transparent focus:border-green-500/50 bg-transparent" title="Payment Amount">
                    
                    <button id="updateDataBtn" class="bg-green-500 text-[#1a1c23] px-4 rounded-lg font-black text-[10px] uppercase hover:bg-green-400 transition-colors accent-glow">Save</button>
                </div>
            </div>
        </div>
    </div>

    <header class="glass-panel sticky top-0 z-50 px-6 py-4 flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 neo-inset flex items-center justify-center rounded-full border border-gray-800">
                <i class="fas fa-ad text-green-500 text-lg"></i>
            </div>
            <h1 class="text-lg font-black text-white tracking-widest uppercase text-glow">Promo<span class="text-green-500">Manager</span></h1>
        </div>
        <a href="dashboard.html" class="neo-button px-4 py-2 flex items-center gap-2 text-[10px] font-black text-gray-400 hover:text-green-500 transition-colors uppercase tracking-widest">
            <i class="fas fa-arrow-left"></i> Dashboard
        </a>
    </header>

    <div class="max-w-5xl mx-auto px-6">
        <div class="neo-card p-6 mb-8 border-t border-green-500/30 relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-green-500/10 rounded-full blur-3xl pointer-events-none"></div>

            <form id="promoForm" class="grid grid-cols-1 md:grid-cols-3 gap-4 relative z-10">
                
                <div class="col-span-1">
                    <label class="block text-[9px] font-black text-gray-500 uppercase tracking-widest mb-1.5">Promo Title</label>
                    <input type="text" id="title" required placeholder="Name of promotion..." class="w-full p-2.5 rounded-lg neo-inset border border-transparent outline-none text-xs font-bold text-white bg-transparent focus:border-green-500/50 transition-colors placeholder-gray-600">
                </div>
                <div class="col-span-1">
                    <label class="block text-[9px] font-black text-gray-500 uppercase tracking-widest mb-1.5">Category</label>
                    <select id="category" class="w-full p-2.5 rounded-lg neo-inset border border-transparent outline-none text-xs font-bold text-white bg-[#1a1c23] focus:border-green-500/50 transition-colors">
                        <option value="islamic">🕋 Islamic</option>
                        <option value="food">🍔 Food</option>
                        <option value="deals">🛍️ Deals</option>
                        <option value="music">🎵 Music / Songs</option>
                        <option value="gaming">🎮 Gaming</option>
                        <option value="sports">🏀 Sports</option>
                    </select>
                </div>
                <div class="col-span-1">
                    <label class="block text-[9px] font-black text-gray-500 uppercase tracking-widest mb-1.5">Format</label>
                    <select id="promo_type" class="w-full p-2.5 rounded-lg neo-inset border border-transparent outline-none text-xs font-bold text-white bg-[#1a1c23] focus:border-green-500/50 transition-colors">
                        <option value="video">🎥 Video File</option>
                        <option value="image">🖼️ Image Banner</option>
                    </select>
                </div>

                <div class="col-span-1 md:col-span-2">
                    <label class="block text-[9px] font-black text-gray-500 uppercase tracking-widest mb-1.5">Description (Optional)</label>
                    <input type="text" id="promo_text" placeholder="Short description..." class="w-full p-2.5 rounded-lg neo-inset border border-transparent outline-none text-xs font-bold text-white bg-transparent focus:border-green-500/50 transition-colors placeholder-gray-600">
                </div>
                <div class="col-span-1">
                    <label class="block text-[9px] font-black text-gray-500 uppercase tracking-widest mb-1.5">Vendor Name</label>
                    <input type="text" id="vendor_name" required placeholder="Sponsor's name" class="w-full p-2.5 rounded-lg neo-inset border border-transparent outline-none text-xs font-bold text-white bg-transparent focus:border-green-500/50 transition-colors placeholder-gray-600">
                </div>

                <div class="col-span-1">
                    <label class="block text-[9px] font-black text-gray-500 uppercase tracking-widest mb-1.5">Expiry Time</label>
                    <input type="datetime-local" id="expiry_date" required class="w-full p-2.5 rounded-lg neo-inset border border-transparent outline-none text-xs font-bold text-gray-300 bg-transparent focus:border-green-500/50 transition-colors">
                </div>
                <div class="col-span-1">
                    <label class="block text-[9px] font-black text-gray-500 uppercase tracking-widest mb-1.5">Duration (Secs)</label>
                    <input type="number" id="duration" required value="15" min="1" class="w-full p-2.5 rounded-lg neo-inset border border-transparent outline-none text-xs font-bold text-white bg-transparent focus:border-green-500/50 transition-colors">
                </div>
                <div class="col-span-1">
                    <label class="block text-[9px] font-black text-green-500 uppercase tracking-widest mb-1.5">Payment Paid</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-green-500 font-black text-[10px]">PKR</span>
                        <input type="number" id="payment_paid" required placeholder="0" class="w-full p-2.5 pl-10 rounded-lg neo-inset border border-transparent outline-none text-xs font-bold text-white bg-transparent focus:border-green-500/50 transition-colors placeholder-gray-600">
                    </div>
                </div>

                <div class="col-span-1 md:col-span-3">
                    <label class="block text-[9px] font-black text-gray-500 uppercase tracking-widest mb-1.5">Media Upload</label>
                    <input type="file" id="fileInput" required class="w-full p-1.5 neo-inset border border-transparent rounded-lg text-[10px] font-bold text-gray-400 file:mr-2 file:py-1 file:px-3 file:rounded-md file:border-0 file:text-[10px] file:font-black file:bg-gray-800 file:text-green-500 bg-transparent cursor-pointer">
                </div>

                <div class="col-span-1 md:col-span-3 mt-2 flex items-center gap-4">
                    <button type="submit" id="submitBtn" class="w-1/3 bg-green-500 text-[#1a1c23] font-black py-3 rounded-xl shadow-lg hover:bg-green-400 transition-colors uppercase tracking-widest text-[10px] flex items-center justify-center gap-2 accent-glow">
                        <i class="fas fa-cloud-upload-alt"></i> Upload Data
                    </button>

                    <div id="progressWrapper" class="hidden flex-1 neo-inset p-3 rounded-xl border border-gray-800">
                        <div class="flex justify-between items-center mb-1.5">
                            <span id="progressState" class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Processing...</span>
                            <div class="flex items-center gap-3">
                                <span id="progressSize" class="text-[9px] font-bold text-gray-500">0 / 0 MB</span>
                                <span id="progressPercent" class="text-xs font-black text-green-500">0%</span>
                            </div>
                        </div>
                        <div class="w-full bg-gray-800 rounded-full h-1.5 overflow-hidden">
                            <div id="progressBar" class="bg-green-500 h-full w-0 transition-none accent-glow"></div>
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <div class="neo-card overflow-hidden border border-gray-800">
            <div class="glass-panel px-4 py-3 border-b border-gray-800 flex justify-between items-center">
                <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest"><i class="fas fa-list text-green-500 mr-2"></i> Active Database</span>
                <span id="itemCount" class="text-[9px] font-black text-green-500 bg-green-500/10 px-2 py-1 rounded-md border border-green-500/20">0 ITEMS</span>
            </div>
            <div class="max-h-[40vh] overflow-y-auto">
                <table class="w-full text-left">
                    <thead class="text-[9px] font-black text-gray-500 uppercase tracking-widest bg-[#121318] sticky top-0 z-10">
                        <tr>
                            <th class="p-4 border-b border-gray-800">Content Overview</th>
                            <th class="p-4 border-b border-gray-800">System Status</th>
                            <th class="p-4 text-right border-b border-gray-800">Controls</th>
                        </tr>
                    </thead>
                    <tbody id="promoList" class="text-xs font-bold text-gray-300 divide-y divide-gray-800/50 bg-[#1a1c23]">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://hkabhikizdlbavfkualt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrYWJoaWtpemRsYmF2Zmt1YWx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODgyMjUsImV4cCI6MjA5MjA2NDIyNX0.iMlS6-M1aylW8K915LPYDHOg7qUxwu5GelH_CPHLP2U');

        const form = document.getElementById('promoForm');
        
        form.onsubmit = async (e) => {
            e.preventDefault();
            const file = document.getElementById('fileInput').files[0];
            const btn = document.getElementById('submitBtn');
            const progressWrapper = document.getElementById('progressWrapper');
            const progressBar = document.getElementById('progressBar');
            const progressPercent = document.getElementById('progressPercent');
            const progressSize = document.getElementById('progressSize');
            const progressState = document.getElementById('progressState');

            btn.disabled = true; 
            btn.innerHTML = "<i class='fas fa-circle-notch fa-spin'></i> Uploading...";
            
            progressWrapper.classList.remove('hidden');
            progressState.innerText = "Encrypting & Uploading...";
            progressBar.style.width = "0%";
            progressPercent.innerText = "0%";

            try {
                const fileName = Date.now() + "_" + file.name.replace(/\s+/g, '_');
                
                const { data: upData, error: upErr } = await _supabase.storage.from('promo-files').upload(fileName, file, {
                    onUploadProgress: (progress) => {
                        const percent = Math.round((progress.loaded / progress.total) * 100);
                        const loadedMB = (progress.loaded / (1024 * 1024)).toFixed(2);
                        const totalMB = (progress.total / (1024 * 1024)).toFixed(2);
                        
                        progressBar.style.width = percent + "%";
                        progressPercent.innerText = percent + "%";
                        progressSize.innerText = `${loadedMB} MB / ${totalMB} MB`;

                        if(percent === 100) {
                            progressState.innerText = "Syncing Database...";
                            progressState.classList.add('text-green-400');
                        }
                    }
                });

                if(upErr) throw upErr;

                const { data: { publicUrl } } = _supabase.storage.from('promo-files').getPublicUrl(fileName);

                // NAYA: payment_paid field database mein insert ho raha hai
                const { error: dbErr } = await _supabase.from('promotions').insert([{
                    title: document.getElementById('title').value,
                    category: document.getElementById('category').value,
                    promo_text: document.getElementById('promo_text').value, 
                    vendor_name: document.getElementById('vendor_name').value,
                    expiry_date: document.getElementById('expiry_date').value,
                    promo_url: publicUrl,
                    promo_type: document.getElementById('promo_type').value,
                    promo_active: true,
                    duration: parseInt(document.getElementById('duration').value), 
                    payment_paid: parseInt(document.getElementById('payment_paid').value) || 0,
                    sort_order: Date.now()
                }]);

                if(dbErr) throw dbErr;
                
                progressState.innerText = "Upload Complete!";
                setTimeout(() => { location.reload(); }, 500);

            } catch(err) { 
                alert(err.message); 
                btn.disabled = false; 
                btn.innerHTML = "<i class='fas fa-cloud-upload-alt'></i> Upload Data"; 
                progressState.innerText = "Upload Failed";
                progressState.classList.add('text-red-500');
            }
        };

        async function fetchPromos() {
            const { data, error } = await _supabase.from('promotions').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('promoList');
            document.getElementById('itemCount').innerText = data ? data.length + ' ITEMS' : '0 ITEMS';
            list.innerHTML = '';

            if (data) {
                data.forEach(item => {
                    const isExpired = new Date(item.expiry_date) < new Date();
                    const row = document.createElement('tr');
                    row.className = "hover:bg-gray-800/40 cursor-pointer transition-colors";
                    row.onclick = (e) => { if(!e.target.closest('button')) showDetails(item); };
                    
                    row.innerHTML = `
                        <td class="p-4 flex items-center gap-4">
                            <div class="w-10 h-10 rounded-lg neo-inset flex items-center justify-center overflow-hidden shrink-0 border border-gray-800 bg-[#121318]">
                                ${item.promo_type === 'video' 
                                    ? `<video src="${item.promo_url}#t=0.1" preload="metadata" muted playsinline class="w-full h-full object-cover opacity-80 hover:opacity-100 transition-opacity bg-black"></video>` 
                                    : `<img src="${item.promo_url}" class="w-full h-full object-cover opacity-80 hover:opacity-100 transition-opacity bg-black">`
                                }
                            </div>
                            <div>
                                <div class="text-[11px] font-black text-gray-200 line-clamp-1">${item.title}</div>
                                <div class="text-[8px] uppercase text-green-500 tracking-widest mt-0.5">${item.category} • PKR ${item.payment_paid || 0}</div>
                            </div>
                        </td>
                        <td class="p-4">
                            <span class="px-2 py-1 rounded-md text-[8px] font-black neo-inset ${isExpired ? 'text-red-500 border border-red-500/20' : 'text-green-500 border border-green-500/20'}">
                                ${isExpired ? 'EXPIRED' : 'ACTIVE'}
                            </span>
                            <span class="text-gray-500 text-[9px] ml-2 uppercase font-bold"><i class="${item.promo_type === 'video' ? 'fas fa-video' : 'fas fa-image'} mr-1"></i>${item.promo_type}</span>
                        </td>
                        <td class="p-4 text-right">
                            <button onclick="showDetails(${JSON.stringify(item).replace(/"/g, '&quot;')})" class="text-green-500 hover:text-green-400 text-[10px] font-bold mr-4 transition-colors"><i class="fas fa-pen"></i> EDIT</button>
                            <button onclick="deletePromo('${item.id}')" class="text-gray-600 hover:text-red-500 transition-colors"><i class="fas fa-trash-alt"></i></button>
                        </td>
                    `;
                    list.appendChild(row);
                });
            }
        }

        let currentEditingId = null;

        function showDetails(item) {
            currentEditingId = item.id;
            const content = document.getElementById('modalContent');
            content.innerHTML = `
                <div class="neo-inset p-3 rounded-xl border border-gray-800/50 mb-3">
                    <p class="text-[9px] uppercase text-gray-500 tracking-widest mb-1">Promo Details</p>
                    <p class="text-gray-300 mt-1">${item.promo_text || 'No description provided.'}</p>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div class="neo-inset p-3 rounded-xl border border-gray-800/50"><p class="text-[9px] uppercase text-gray-500 tracking-widest">Vendor</p><p class="text-white mt-1">${item.vendor_name}</p></div>
                    <div class="neo-inset p-3 rounded-xl border border-green-500/10"><p class="text-[9px] uppercase text-green-500 tracking-widest">Paid Amount</p><p class="text-green-400 font-black text-[10px] mt-1">PKR ${item.payment_paid || 0}</p></div>
                </div>
                <div class="neo-inset p-3 rounded-xl border border-red-500/10"><p class="text-[9px] uppercase text-red-500 tracking-widest">Current Expiry</p><p class="text-red-400 text-[10px] mt-1">${new Date(item.expiry_date).toLocaleString()}</p></div>
            `;
            
            if (item.expiry_date) document.getElementById('new_expiry_date').value = item.expiry_date.slice(0, 16);
            document.getElementById('new_duration').value = item.duration;
            document.getElementById('new_payment').value = item.payment_paid || 0;
            document.getElementById('detailsModal').classList.add('active');
        }

        document.getElementById('updateDataBtn').onclick = async () => {
            const newDate = document.getElementById('new_expiry_date').value;
            const newDuration = document.getElementById('new_duration').value;
            const newPayment = document.getElementById('new_payment').value;
            
            if(!newDate || !newDuration) return alert("Fill both date and duration!");
            
            const btn = document.getElementById('updateDataBtn');
            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i>";
            
            // NAYA: Update process me payment save ho rahi hai
            const { error } = await _supabase.from('promotions').update({ 
                expiry_date: newDate, 
                duration: parseInt(newDuration),
                payment_paid: parseInt(newPayment) || 0
            }).eq('id', currentEditingId);
            
            if(!error) { location.reload(); } else { alert(error.message); btn.innerText = "Save"; }
        };

        function closeModal() { document.getElementById('detailsModal').classList.remove('active'); }
        async function deletePromo(id) { if(confirm("Permanently delete this item?")) { await _supabase.from('promotions').delete().eq('id', id); fetchPromos(); } }
        
        fetchPromos();
    </script>
</body>
</html>
