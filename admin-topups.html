<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Wallet Approval</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .btn-approve { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .btn-reject { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
    </style>
</head>
<body class="p-4">

    <header class="flex justify-between items-center mb-8 pt-2 max-w-4xl mx-auto">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-orange-500 rounded-full flex items-center justify-center shadow-lg shadow-orange-500/20">
                <i class="fas fa-hand-holding-usd text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-black italic text-white tracking-tighter">TOP-UP <span class="text-orange-500">REQUESTS</span></h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Verification Portal</p>
            </div>
        </div>
        <div class="bg-slate-800 px-4 py-2 rounded-2xl border border-white/5">
            <span id="pendingCount" class="text-orange-500 font-black">0</span>
            <span class="text-[10px] text-slate-400 font-bold ml-1 uppercase">Pending</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto space-y-4" id="requestList">
        <div class="py-20 text-center opacity-30 text-[10px] font-black uppercase tracking-[0.4em] animate-pulse">
            Scanning Database...
        </div>
    </main>

    <div id="imgModal" class="hidden fixed inset-0 bg-black/95 z-[9999] flex items-center justify-center p-4" onclick="this.classList.add('hidden')">
        <img id="fullImg" src="" class="max-w-full max-h-full rounded-lg shadow-2xl border-4 border-white/10">
        <p class="absolute bottom-10 text-white/50 text-xs font-bold uppercase tracking-widest">Click anywhere to close</p>
    </div>

    <script>
        const SB_URL = "https://hkabhikizdlbavfkualt.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrYWJoaWtpemRsYmF2Zmt1YWx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODgyMjUsImV4cCI6MjA5MjA2NDIyNX0.iMlS6-M1aylW8K915LPYDHOg7qUxwu5GelH_CPHLP2U";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentTab = 'pending';

        async function loadRequests(tab = 'pending') {
            currentTab = tab;
            
            const tabP = document.getElementById('tabPending');
            const tabH = document.getElementById('tabHistory');
            if(tabP) tabP.className = tab === 'pending' ? 'flex-1 py-3 bg-orange-500 text-white font-bold rounded-xl' : 'flex-1 py-3 text-slate-400 font-bold';
            if(tabH) tabH.className = tab === 'history' ? 'flex-1 py-3 bg-orange-500 text-white font-bold rounded-xl' : 'flex-1 py-3 text-slate-400 font-bold';

            try {
                let queryResult;
                if (tab === 'pending') {
                    queryResult = await _supabase.from('topup_requests').select('*').eq('status', 'pending').order('created_at', { ascending: false });
                } else {
                    queryResult = await _supabase.from('topup_requests').select('*').neq('status', 'pending').order('created_at', { ascending: false });
                }

                const { data, error } = queryResult;
                if (error) throw error;

                if (tab === 'pending' && document.getElementById('pendingCount')) {
                    document.getElementById('pendingCount').innerText = data.length;
                }

                if (data.length === 0) {
                    document.getElementById('requestList').innerHTML = `<div class="text-center py-20 opacity-20 font-black uppercase text-xs">No ${tab} requests found</div>`;
                    return;
                }

                const phoneList = [...new Set(data.map(req => req.customer_phone.trim()))];
                let custData = [];
                
                if (phoneList.length > 0) {
                    const { data: cData, error: cErr } = await _supabase.from('customers').select('phone, name, address').in('phone', phoneList);
                    if (!cErr) custData = cData || [];
                }

                const finalData = data.map(req => {
                    const cust = custData.find(c => c.phone && c.phone.trim() === req.customer_phone.trim());
                    return { 
                        ...req, 
                        customer_name: cust ? cust.name : 'Unknown User', 
                        customer_address: cust ? cust.address : 'Address not found' 
                    };
                });

                renderList(finalData, tab);

            } catch (err) {
                console.error(err);
                document.getElementById('requestList').innerHTML = `<div class="text-center py-20 text-red-500 font-bold text-xs uppercase">Error loading data: ${err.message}</div>`;
            }
        }

        function renderList(data, tab) {
            const container = document.getElementById('requestList');
            
            container.innerHTML = data.map(req => `
                <div class="glass-card p-5 rounded-[2rem] mb-4">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <h3 class="font-black text-white text-lg tracking-tight">${req.customer_name}</h3>
                            <p class="text-xs text-orange-500 font-bold mb-1">${req.customer_phone}</p>
                            <p class="text-sm text-slate-300 font-semibold"><i class="fas fa-map-marker-alt mr-1 text-slate-400"></i>${req.customer_address}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-xs font-black text-white">Rs. ${req.amount}</span>
                            <p class="text-[8px] text-slate-500 uppercase">${new Date(req.created_at).toLocaleString()}</p>
                        </div>
                    </div>
                    
                    <div class="bg-black/20 p-3 rounded-xl mb-3 text-[9px] text-slate-400 italic">
                        ${req.bank_snapshot || 'Direct Deposit'}
                    </div>

                    <div class="flex items-center gap-3">
                        <img src="${req.proof_image}" onclick="showImg('${req.proof_image}')" class="w-14 h-14 object-cover rounded-xl border border-white/10 hover:border-orange-500 cursor-pointer shadow-lg">
                        ${tab === 'pending' ? `
                            <button onclick="updateStatus(${req.id}, 'approved', '${req.customer_phone}', ${req.amount})" class="flex-1 bg-emerald-600 py-4 rounded-xl text-xs font-black uppercase active:scale-95 shadow-lg shadow-emerald-500/20">Approve</button>
                            <button onclick="updateStatus(${req.id}, 'rejected', '${req.customer_phone}', ${req.amount})" class="flex-1 bg-red-600/20 text-red-500 py-4 rounded-xl text-xs font-black uppercase active:scale-95 shadow-lg shadow-red-500/10">Reject</button>
                        ` : `
                            <div class="flex-1 text-center py-3 bg-white/5 rounded-xl text-[10px] font-black uppercase tracking-widest ${req.status === 'approved' ? 'text-emerald-500' : 'text-red-500'}">
                                Request ${req.status}
                            </div>
                        `}
                    </div>
                </div>
            `).join('');
        }

        async function updateStatus(id, newStatus, customerPhone, amount) {
            let rejectReason = "";

            // ✅ REJECT REASON POPUP
            if (newStatus === 'rejected') {
                rejectReason = prompt("Please enter the reason for rejecting this top-up:");
                if (rejectReason === null || rejectReason.trim() === "") {
                    alert("Rejection reason is required! Action cancelled.");
                    return; // Agar reason na likhe toh cancel kar dega
                }
            } else {
                if(!confirm(`Are you sure you want to approve Rs. ${amount}?`)) return;
            }

            try {
                // Wallet Update (Only if approved)
                if (newStatus === 'approved') {
                    const topupAmount = parseFloat(amount);
                    const { data: wallet, error: walErr } = await _supabase.from('wallets').select('current_balance').eq('customer_phone', customerPhone).maybeSingle();

                    if (walErr) throw new Error("Wallet Check Error: " + walErr.message);

                    if (wallet) {
                        const newBalance = parseFloat(wallet.current_balance || 0) - topupAmount;
                        const { error: updateWalErr } = await _supabase.from('wallets').update({ current_balance: newBalance, updated_at: new Date().toISOString() }).eq('customer_phone', customerPhone);
                        if (updateWalErr) throw new Error("Wallet Update Error: " + updateWalErr.message);
                    } else {
                        const { error: insertWalErr } = await _supabase.from('wallets').insert([{ customer_phone: customerPhone, current_balance: -topupAmount, updated_at: new Date().toISOString() }]);
                        if (insertWalErr) throw new Error("Wallet Insert Error: " + insertWalErr.message);
                    }
                }

                // Update Request Status
                const { error: reqErr } = await _supabase.from('topup_requests').update({ status: newStatus, updated_at: new Date().toISOString() }).eq('id', id);
                if (reqErr) throw new Error("Request Update Error: " + reqErr.message);

                // ✅ SEND NOTIFICATION LOGIC
                let notifTitle = newStatus === 'approved' ? "Top-up Approved! ✅" : "Top-up Rejected ❌";
                let notifMsg = newStatus === 'approved' 
                    ? `Your top-up of Rs. ${amount} has been successfully verified and added to your wallet.` 
                    : `Your top-up of Rs. ${amount} was rejected. Reason: ${rejectReason}`;

                await _supabase.from('notifications').insert([{
                    phone: customerPhone,
                    title: notifTitle,
                    message: notifMsg,
                    created_at: new Date().toISOString()
                }]);

                alert(`Request ${newStatus} successfully! Notification sent to customer.`);
                loadRequests(currentTab);

            } catch (err) {
                alert("Action failed: " + err.message);
            }
        }

        function showImg(url) {
            document.getElementById('fullImg').src = url;
            document.getElementById('imgModal').classList.remove('hidden');
        }

        window.onload = () => loadRequests('pending');

        _supabase.channel('admin-topups')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'topup_requests' }, () => loadRequests(currentTab))
            .subscribe();
            
    </script>

<div class="max-w-4xl mx-auto flex bg-slate-800/50 p-1 rounded-2xl mb-6">
    <button id="tabPending" onclick="loadRequests('pending')" class="flex-1 py-3 bg-orange-500 text-white font-bold rounded-xl">PENDING</button>
    <button id="tabHistory" onclick="loadRequests('history')" class="flex-1 py-3 text-slate-400 font-bold">HISTORY</button>
</div>
</body>
</html>
