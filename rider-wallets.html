<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faster Admin - Rider Wallets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            color: #334155;
        }

        .premium-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .premium-card:hover { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08); border-color: #cbd5e1; }

        .tab-btn { transition: all 0.3s ease; }
        .tab-active { background-color: #0f172a; color: white; border-color: #0f172a; }
        .tab-inactive { background-color: white; color: #64748b; border-color: #e2e8f0; }
        .tab-inactive:hover { background-color: #f1f5f9; }

        .toast-enter { transform: translate(-50%, 0); opacity: 1; }
        .toast-leave { transform: translate(-50%, -150%); opacity: 0; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="toast" class="toast-leave fixed top-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-2xl bg-slate-900 text-white shadow-xl transition-all duration-500 z-[99999] flex items-center gap-3 font-bold text-xs uppercase tracking-widest">
        <i id="toastIcon" class="fas fa-check-circle text-emerald-400"></i>
        <span id="toastMsg">Action Complete</span>
    </div>

    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 px-4 md:px-6 py-4 shadow-sm">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row md:justify-between md:items-center gap-4">
            <div class="flex items-center gap-4">
                <button onclick="location.href='wallets-control.html'" class="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center hover:bg-slate-200 transition-colors text-slate-600 shrink-0">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <div>
                    <h1 class="text-xl font-extrabold text-slate-800 tracking-tight">Rider Fleet Wallets</h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Rider Cash Management Terminal</p>
                </div>
            </div>
            
            <div class="flex items-center gap-3 w-full md:w-auto">
                <div class="relative flex-1 md:w-64">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                    <input type="text" id="riderSearch" onkeyup="filterRiders()" placeholder="Search Rider Name or ID..." class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2 pl-9 pr-3 text-xs font-bold outline-none focus:border-blue-500 transition-colors">
                </div>
                <div class="flex items-center gap-2 bg-emerald-50 px-3 py-2 rounded-xl border border-emerald-100 shrink-0 text-[10px] text-emerald-600 font-bold uppercase tracking-widest">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    Live Sync
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 p-4 md:p-6 max-w-7xl mx-auto w-full">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <button onclick="switchTab('debt')" id="tab-debt" class="tab-btn tab-active py-5 rounded-[2rem] border shadow-sm flex flex-col items-center justify-center p-4">
                <p class="text-[10px] font-black uppercase tracking-widest opacity-70 mb-1">Pending Debt (Riders se Lene Hain)</p>
                <div class="flex items-baseline gap-2">
                    <span id="totalDebtAmount" class="text-2xl font-black">Rs. 0</span>
                    <span id="badge-debt-count" class="bg-red-500 text-white text-[9px] px-2 py-0.5 rounded-full font-bold">0 Riders</span>
                </div>
            </button>

            <button onclick="switchTab('credit')" id="tab-credit" class="tab-btn tab-inactive py-5 rounded-[2rem] border shadow-sm flex flex-col items-center justify-center p-4">
                <p class="text-[10px] font-black uppercase tracking-widest opacity-70 mb-1">Advance Credit (Rider ko Dene Hain)</p>
                <div class="flex items-baseline gap-2">
                    <span id="totalCreditAmount" class="text-2xl font-black text-emerald-600">Rs. 0</span>
                    <span id="badge-credit-count" class="bg-emerald-500 text-white text-[9px] px-2 py-0.5 rounded-full font-bold">0 Riders</span>
                </div>
            </button>
        </div>

        <div id="content-debt" class="space-y-4 block">
            <div id="debtList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="py-20 text-center text-slate-400 col-span-2"><i class="fas fa-circle-notch fa-spin text-3xl mb-3 text-slate-900"></i><br><span class="text-[10px] font-bold uppercase tracking-widest">Scanning Debt Ledgers...</span></div>
            </div>
        </div>

        <div id="content-credit" class="space-y-4 hidden">
            <div id="creditList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="py-20 text-center text-slate-400 col-span-2"><i class="fas fa-circle-notch fa-spin text-3xl mb-3 text-emerald-600"></i><br><span class="text-[10px] font-bold uppercase tracking-widest">Scanning Credit Ledgers...</span></div>
            </div>
        </div>

    </main>

    <script>
        const SB_URL = "https://hkabhikizdlbavfkualt.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrYWJoaWtpemRsYmF2Zmt1YWx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODgyMjUsImV4cCI6MjA5MjA2NDIyNX0.iMlS6-M1aylW8K915LPYDHOg7qUxwu5GelH_CPHLP2U";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let riderWalletsData = [];
        let ridersProfileMap = {};
        let currentActiveTab = 'debt';

        function showToast(msg, type='success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            document.getElementById('toastMsg').innerText = msg;
            toast.className = `fixed top-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-2xl shadow-xl transition-all duration-500 z-[99999] flex items-center gap-3 font-bold text-xs uppercase tracking-widest toast-enter ${type === 'error' ? 'bg-red-600 text-white' : 'bg-slate-900 text-white'}`;
            icon.className = type !== 'error' ? "fas fa-check-circle text-emerald-400" : "fas fa-exclamation-triangle text-white";
            setTimeout(() => toast.classList.replace('toast-enter', 'toast-leave'), 3000);
        }

        function switchTab(tabId) {
            currentActiveTab = tabId;
            ['debt', 'credit'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.replace('tab-active', 'tab-inactive');
                document.getElementById(`content-${t}`).classList.add('hidden');
            });
            document.getElementById(`tab-${tabId}`).classList.replace('tab-inactive', 'tab-active');
            document.getElementById(`content-${tabId}`).classList.remove('hidden');
            filterRiders(); 
        }

        async function fetchRiderLedgers() {
            try {
                const { data: profiles } = await _supabase.from('riders').select('name, phone, rider_id');
                if(profiles) {
                    profiles.forEach(p => {
                        if(p.phone) ridersProfileMap[p.phone.trim()] = p;
                    });
                }

                const { data: wallets, error } = await _supabase.from('rider_wallets').select('*');
                if (error) throw error;
                
                riderWalletsData = wallets || [];
                // FIXED: Space removed
                calculateTotalsAndRender();

            } catch(e) {
                console.error(e);
                showToast("Sync Failed", "error");
            }
        }

        function calculateTotalsAndRender() {
            const debtList = riderWalletsData.filter(w => parseFloat(w.balance) > 0);
            const creditList = riderWalletsData.filter(w => parseFloat(w.balance) < 0);

            const totalDebtSum = debtList.reduce((sum, w) => sum + parseFloat(w.balance || 0), 0);
            const totalCreditSum = creditList.reduce((sum, w) => sum + Math.abs(parseFloat(w.balance || 0)), 0);

            document.getElementById('totalDebtAmount').innerText = `Rs. ${totalDebtSum.toLocaleString()}`;
            document.getElementById('badge-debt-count').innerText = `${debtList.length} Riders`;

            document.getElementById('totalCreditAmount').innerText = `Rs. ${totalCreditSum.toLocaleString()}`;
            document.getElementById('badge-credit-count').innerText = `${creditList.length} Riders`;

            renderRiderCards('debtList', debtList, 'debt');
            renderRiderCards('creditList', creditList, 'credit');
        }

        function renderRiderCards(containerId, dataList, type) {
            const container = document.getElementById(containerId);
            if(dataList.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-16 bg-white border border-slate-200 rounded-[2rem] col-span-2">
                        <i class="fas fa-check-double text-emerald-400 text-3xl mb-2"></i>
                        <p class="text-xs font-black text-slate-400 uppercase tracking-wider">Ledger Clear. No Riders Found.</p>
                    </div>`;
                return;
            }

            container.innerHTML = dataList.map(w => {
                const rPhone = String(w.rider_phone || '').trim();
                const profile = ridersProfileMap[rPhone] || { name: 'Unknown Rider', rider_id: 'N/A' };
                
                const cardAmt = Math.abs(parseFloat(w.balance || 0));
                const amtColor = type === 'debt' ? 'text-red-600' : 'text-emerald-600';
                const badgeLabel = type === 'debt' ? 'Owes Office (Debt)' : 'Office Owes Rider (Credit)';
                const badgeStyle = type === 'debt' ? 'bg-red-50 text-red-600 border-red-100' : 'bg-emerald-50 text-emerald-600 border-emerald-100';
                
                const updateDate = new Date(w.updated_at || new Date());
                const dateStr = updateDate.toLocaleDateString() + ' ' + updateDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                return `
                    <div class="premium-card p-5 rounded-[2rem] flex flex-col justify-between history-rider-node" data-search-name="${profile.name.toLowerCase()}" data-search-id="${profile.rider_id.toLowerCase()}">
                        <div class="flex justify-between items-start gap-2">
                            <div>
                                <span class="px-2 py-0.5 rounded text-[8px] font-black uppercase border tracking-wider ${badgeStyle}">${badgeLabel}</span>
                                <h3 class="text-sm font-black text-slate-800 uppercase mt-2">${profile.name}</h3>
                                <p class="text-[10px] font-extrabold text-blue-600 uppercase tracking-wider mt-0.5">ID: ${profile.rider_id} &bull; ${w.rider_phone}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest">Wallet Balance</p>
                                <p class="text-xl font-extrabold tracking-tight ${amtColor}">Rs. ${cardAmt}</p>
                            </div>
                        </div>

                        <div class="mt-5 pt-3 border-t border-dashed border-slate-200 flex justify-between items-center">
                            <span class="text-[8px] font-bold text-slate-400 uppercase"><i class="fas fa-clock mr-1"></i>Last Sync: ${dateStr}</span>
                            <button onclick="settleRiderKhata('${w.rider_phone}', '${profile.name}', ${w.balance})" class="bg-slate-900 hover:bg-slate-800 text-white text-[9px] font-black uppercase tracking-widest px-4 py-2 rounded-xl active:scale-95 shadow transition-all flex items-center gap-1">
                                <i class="fas fa-hand-holding-usd"></i> Settle Khata
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function settleRiderKhata(phone, name, currentBal) {
            const absAmt = Math.abs(parseFloat(currentBal));
            // FIXED: Added missing '?' for the ternary condition
            const msg = currentBal > 0 ?
                `Kya aapne rider ${name} se Rs. ${absAmt} cash RECEIVE kar liya hai aur khata 0 karna chahte hain?` :
                `Kya aapne rider ${name} ko Rs. ${absAmt} cash PAY kar diya hai aur khata 0 karna chahte hain?`;

            if(!confirm(msg)) return;

            showToast("Processing Settlement...");
            try {
                const { error } = await _supabase
                    .from('rider_wallets')
                    .update({ 
                        balance: 0, 
                        updated_at: new Date().toISOString() 
                    })
                    .eq('rider_phone', phone);

                if (error) throw error;
                showToast(`Khata Clear! ${name}'s Wallet reset to Rs. 0.`);
                
                await _supabase.from('notifications').insert([{
                    phone: phone,
                    title: '💼 Wallet Settled Clear',
                    message: `Admin ne aapka office account clear kar diya hai. Current Balance: Rs. 0`,
                    created_at: new Date().toISOString()
                }]);

            } catch(err) {
                showToast("Settlement failed", "error");
            }
        }

        function filterRiders() {
            const query = document.getElementById('riderSearch').value.toLowerCase().trim();
            document.querySelectorAll('.history-rider-node').forEach(card => {
                const name = card.getAttribute('data-search-name');
                const id = card.getAttribute('data-search-id');
                if (name.includes(query) || id.includes(query)) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        window.onload = () => {
            fetchRiderLedgers();
            
            _supabase.channel('live-rider-wallets')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'rider_wallets' }, () => {
                    fetchRiderLedgers();
                })
                .subscribe();
        };
    </script>
</body>
</html>
