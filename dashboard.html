<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faster Admin - Clean Main Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        
        :root {
            --bg-color: #1a1c23;      
            --neo-dark: #121318;      
            --neo-light: #22252e;     
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-color); 
            color: #9ca3af; 
            overflow: hidden; 
        }

        /* NEOMORPHISM */
        .neo-inset {
            background: var(--bg-color);
            box-shadow: inset 4px 4px 8px var(--neo-dark), inset -4px -4px 8px var(--neo-light);
        }

        .neo-outset {
            background: var(--bg-color);
            box-shadow: 6px 6px 12px var(--neo-dark), -6px -6px 12px var(--neo-light);
        }

        /* GLASSMORPHISM */
        .glass-panel {
            background: rgba(26, 28, 35, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .accent-glow { box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); }
        .text-glow { color: white; text-shadow: 0 0 15px rgba(34, 197, 94, 0.5); }

        /* SIDEBAR MAGIC */
        .sidebar {
            width: 80px; 
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar:hover {
            width: 280px; 
        }
        .nav-text {
            opacity: 0;
            transform: translateX(-15px);
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .sidebar:hover .nav-text {
            opacity: 1;
            transform: translateX(0);
        }
        .nav-item:hover .nav-icon {
            color: #22c55e;
            transform: scale(1.1);
        }
    </style>
</head>
<body class="flex h-screen w-full">

    <aside class="sidebar glass-panel h-full flex flex-col z-50 relative group">
        
        <div class="h-20 flex items-center px-6 border-b border-gray-800 shrink-0">
            <div class="w-8 h-8 rounded-full flex items-center justify-center border border-green-500/30 shrink-0">
                <i class="fas fa-bolt text-green-500 drop-shadow-[0_0_5px_rgba(34,197,94,0.8)]"></i>
            </div>
            <h1 class="nav-text text-lg font-black text-white tracking-widest uppercase ml-4">Faster<span class="text-green-500">Admin</span></h1>
        </div>

        <nav class="flex-1 overflow-y-auto py-6 space-y-2 overflow-x-hidden">
            
            <a href="dashboard.html" class="nav-item flex items-center px-6 py-4 text-green-500 bg-green-500/5 border-l-4 border-green-500">
                <i class="nav-icon fas fa-chart-pie w-8 text-center text-xl transition-all drop-shadow-[0_0_8px_rgba(34,197,94,0.5)]"></i>
                <span class="nav-text font-black text-xs uppercase tracking-widest ml-4">Dashboard</span>
            </a>

            <a href="promo-dashboard.html" class="nav-item flex items-center px-6 py-4 text-gray-400 hover:bg-gray-800/40 transition-colors border-l-4 border-transparent hover:border-green-500">
                <i class="nav-icon fas fa-ad w-8 text-center text-xl transition-all"></i>
                <span class="nav-text font-black text-xs uppercase tracking-widest ml-4 flex items-center justify-between w-full">
                    Promotions
                    <span class="bg-gray-700 text-white text-[8px] px-2 py-0.5 rounded-full ml-4">READY</span>
                </span>
            </a>

            <a href="settings.html" class="nav-item flex items-center px-6 py-4 text-gray-400 hover:bg-gray-800/40 transition-colors border-l-4 border-transparent hover:border-green-500">
                <i class="nav-icon fas fa-cogs w-8 text-center text-xl transition-all"></i>
                <span class="nav-text font-black text-xs uppercase tracking-widest ml-4">Settings</span>
            </a>

        </nav>

        <div class="p-4 border-t border-gray-800">
            <a href="#" class="nav-item flex items-center px-2 py-2 text-red-400 hover:bg-red-500/10 rounded-xl transition-colors">
                <i class="fas fa-sign-out-alt w-8 text-center text-lg"></i>
                <span class="nav-text font-black text-xs uppercase tracking-widest ml-4">Log Out</span>
            </a>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-green-900/20 via-[#1a1c23] to-[#1a1c23] relative">
        
        <header class="h-20 px-8 flex justify-between items-center border-b border-gray-800/50 bg-[#1a1c23]/50 backdrop-blur-md">
            <div>
                <h2 class="text-white font-black text-lg tracking-widest uppercase text-glow">System Hub</h2>
            </div>
            <div class="flex items-center gap-6">
                <div class="text-right border-r border-gray-800 pr-6">
                    <p class="text-xl font-black text-white tracking-widest" id="liveTime">00:00:00</p>
                    <p class="text-[9px] text-green-500 font-bold uppercase tracking-widest">Live Connect</p>
                </div>
                <div class="flex items-center gap-3 neo-inset px-4 py-2 rounded-full border border-gray-800">
                    <div class="w-2 h-2 rounded-full bg-green-500 accent-glow animate-pulse"></div>
                    <span class="text-xs font-black text-gray-300 uppercase tracking-widest">Waseem Akram</span>
                </div>
            </div>
        </header>

        <div id="mainDashboardArea" class="flex-1 p-8 overflow-y-auto">
            
            <div class="flex flex-wrap gap-4">
                
                <a href="order-management.html" class="w-[220px] min-h-[150px] group neo-outset rounded-[2rem] p-4 flex flex-col items-center justify-center text-center cursor-pointer transition-all duration-300 hover:neo-inset border border-transparent hover:border-green-500/20 active:scale-95">
    
                   <div class="w-14 h-14 rounded-full neo-inset flex items-center justify-center mb-3 group-hover:scale-110 transition-transform duration-300">
                   <i class="fas fa-clipboard-list text-xl text-gray-500 group-hover:text-green-500 group-hover:drop-shadow-[0_0_8px_rgba(34,197,94,0.8)] transition-colors"></i>
                    </div>
    
                    <h3 class="text-white font-black text-xs uppercase tracking-widest group-hover:text-green-400 transition-colors">Order Management</h3>
                    <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest mt-2 px-2 leading-relaxed">
                      Control, Track & Manage orders.
                    </p>
                </a>
                <a href="admin-topups.html" class="w-[220px] min-h-[150px] group neo-outset rounded-[2rem] p-5 flex flex-col items-center justify-center text-center cursor-pointer transition-all duration-300 hover:neo-inset border border-transparent hover:border-green-500/20 active:scale-95">
    
                    <div class="w-14 h-14 rounded-full neo-inset flex items-center justify-center mb-3 group-hover:scale-110 transition-transform duration-300">
                    <i class="fas fa-clipboard-list text-xl text-gray-500 group-hover:text-green-500 group-hover:drop-shadow-[0_0_8px_rgba(34,197,94,0.8)] transition-colors"></i>
                    </div>
    
                    <h3 class="text-white font-black text-xs uppercase tracking-widest group-hover:text-green-400 transition-colors">Top-Up wallet</h3>
                     <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest mt-2 px-2 leading-relaxed">
                     Control track wallet topup request.
                     </p>
                </a>

            </div>

        </div>

    </main>

    <script>
        // Live Clock with Seconds
        function updateTime() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();
            let ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;
            document.getElementById('liveTime').innerText = hours + ':' + minutes + ':' + seconds + ' ' + ampm;
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
