<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Withdraw Requests</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; }
        .animate-pop { animation: pop 0.3s ease-out; }
        @keyframes pop { 0% { transform: scale(0.98); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="bg-slate-900 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2.5 rounded-xl">
                    <i class="fas fa-user-shield text-xl"></i>
                </div>
                <div>
                    <h1 class="font-extrabold text-lg tracking-tight">Admin Wallet Control</h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Withdraw Management</p>
                </div>
            </div>
            <button onclick="location.href='withdraw-history.html'" class="w-full sm:w-auto bg-slate-800 hover:bg-slate-700 active:bg-slate-900 border border-slate-700 px-5 py-2.5 rounded-xl text-xs font-bold uppercase tracking-widest transition-all flex items-center justify-center gap-2">
                <i class="fas fa-history text-blue-400"></i> View History Log
            </button>
        </div>
    </header>

    <main class="flex-1 p-4 sm:p-6 max-w-6xl w-full mx-auto">
        
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between">
                <div>
                    <p class="text-[10px] text-slate-400 font-black uppercase tracking-wider">Pending Requests</p>
                    <h3 id="statPendingCount" class="text-2xl font-black text-slate-800 mt-1">0</h3>
                </div>
                <div class="bg-amber-100 text-amber-600 p-3 rounded-xl"><i class="fas fa-clock text-xl"></i></div>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between">
                <div>
                    <p class="text-[10px] text-slate-400 font-black uppercase tracking-wider">Total Approved Disbursed</p>
                    <h3 id="statApprovedAmount" class="text-2xl font-black text-emerald-600 mt-1">Rs. 0</h3>
                </div>
                <div class="bg-emerald-100 text-emerald-600 p-3 rounded-xl"><i class="fas fa-check-double text-xl"></i></div>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between">
                <div>
                    <p class="text-[10px] text-slate-400 font-black uppercase tracking-wider">Filter List View</p>
                    <select id="statusFilter" onchange="filterRequests()" class="mt-1 block w-full text-xs font-bold rounded-lg border-slate-200 bg-slate-50 p-2 focus:outline-none">
                        <option value="all">Show All Requests</option>
                        <option value="pending" selected>Pending Only</option>
                        <option value="approved">Approved Only</option>
                        <option value="cancelled">Cancelled Only</option>
                    </select>
                </div>
                <div class="bg-blue-100 text-blue-600 p-3 rounded-xl"><i class="fas fa-filter text-xl"></i></div>
            </div>
        </div>

        <div class="mb-4 flex items-center justify-between px-1">
            <h2 class="font-black text-slate-700 uppercase text-xs tracking-widest">Customer Applications</h2>
            <span id="liveBadge" class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[9px] font-black uppercase tracking-wider bg-emerald-500/10 text-emerald-600 border border-emerald-500/20">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> Live Sync Active
            </span>
        </div>

        <div id="requestsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="col-span-full text-center py-20 bg-white rounded-3xl border shadow-sm text-xs font-bold uppercase tracking-wider text-slate-400">
                <i class="fas fa-spinner fa-spin text-lg mb-2 block"></i> Loading Requests...
            </div>
        </div>
    </main>

    <script>
        const SB_URL = "https://hkabhikizdlbavfkualt.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrYWJoaWtpemRsYmF2Zmt1YWx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODgyMjUsImV4cCI6MjA5MjA2NDIyNX0.iMlS6-M1aylW8K915LPYDHOg7qUxwu5GelH_CPHLP2U";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let allRequests = [];

        async function fetchRequests() {
            try {
                const { data, error } = await _supabase
                    .from('withdraw_requests')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                allRequests = data || [];
                
                calculateStats();
                renderRequests();
            } catch (err) {
                console.error("Fetch Error:", err);
                document.getElementById('requestsContainer').innerHTML = `<div class="col-span-full text-center p-10 text-red-500 font-bold text-xs">Error loading data. Check console.</div>`;
            }
        }

        function calculateStats() {
            const pending = allRequests.filter(r => r.status.toLowerCase() === 'pending').length;
            const approvedAmt = allRequests
                .filter(r => r.status.toLowerCase() === 'approved')
                .reduce((sum, r) => sum + parseFloat(r.amount || 0), 0);

            document.getElementById('statPendingCount').innerText = pending;
            document.getElementById('statApprovedAmount').innerText = `Rs. ${approvedAmt}`;
        }

        function filterRequests() {
            renderRequests();
        }

        function renderRequests() {
            const container = document.getElementById('requestsContainer');
            const filterValue = document.getElementById('statusFilter').value;
            
            let filtered = allRequests;
            if (filterValue !== 'all') {
                filtered = allRequests.filter(r => r.status.toLowerCase() === filterValue);
            }

            if (filtered.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-16 bg-white rounded-3xl border border-dashed text-xs font-bold uppercase text-slate-400">No requests found matching criteria</div>`;
                return;
            }

            container.innerHTML = filtered.map(req => {
                const status = req.status.toLowerCase();
                let statusBadge = '';
                let actionArea = '';

                if (status === 'pending') {
                    statusBadge = `<span class="px-3 py-1 rounded-full text-[9px] font-black uppercase bg-amber-100 text-amber-700 border border-amber-300">PENDING</span>`;
                    
                    actionArea = `
                        <div class="mt-5 pt-4 border-t border-slate-100 space-y-3">
                            <div>
                                <label class="block text-[9px] font-bold text-slate-500 uppercase mb-1">Bank Reference ID / Confirmation Memo</label>
                                <input type="text" id="ref_${req.id}" placeholder="Enter Transaction ID or msg details..." class="w-full text-xs p-2.5 border border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 bg-slate-50">
                            </div>
                            <div>
                                <label class="block text-[9px] font-bold text-slate-500 uppercase mb-1">Cancellation Reason (If rejecting)</label>
                                <input type="text" id="reason_${req.id}" placeholder="e.g. Invalid account title or Details" class="w-full text-xs p-2.5 border border-slate-200 rounded-xl focus:outline-none focus:border-red-500 bg-slate-50">
                            </div>
                            <div class="flex gap-2 pt-1">
                                <button onclick="processAction(${req.id}, 'cancelled')" class="flex-1 bg-red-50 hover:bg-red-100 active:bg-red-200 text-red-600 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-wider transition-colors border border-red-200">
                                    <i class="fas fa-times mr-1"></i> Cancel
                                </button>
                                <button onclick="processAction(${req.id}, 'approved')" class="flex-1 bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 text-white py-2.5 rounded-xl text-[10px] font-black uppercase tracking-wider transition-colors shadow-sm">
                                    <i class="fas fa-check mr-1"></i> Approve
                                </button>
                            </div>
                        </div>
                    `;
                } else if (status === 'approved') {
                    statusBadge = `<span class="px-3 py-1 rounded-full text-[9px] font-black uppercase bg-emerald-100 text-emerald-700 border border-emerald-300">APPROVED</span>`;
                    actionArea = `
                        <div class="mt-3 p-3 bg-emerald-50/50 rounded-xl border border-emerald-100 text-[11px]">
                            <span class="font-bold text-slate-500 block uppercase text-[8px] mb-0.5">Admin Reference Memo:</span>
                            <span class="font-extrabold text-emerald-800"><i class="fas fa-receipt mr-1"></i> ${req.admin_reference || 'Success'}</span>
                        </div>
                    `;
                } else {
                    statusBadge = `<span class="px-3 py-1 rounded-full text-[9px] font-black uppercase bg-red-100 text-red-700 border border-red-300">CANCELLED</span>`;
                    actionArea = `
                        <div class="mt-3 p-3 bg-red-50/50 rounded-xl border border-red-100 text-[11px]">
                            <span class="font-bold text-slate-500 block uppercase text-[8px] mb-0.5">Reason for Cancellation:</span>
                            <span class="font-extrabold text-red-800"><i class="fas fa-exclamation-circle mr-1"></i> ${req.cancel_reason || 'No reason specified'}</span>
                        </div>
                    `;
                }

                return `
                    <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm animate-pop flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start border-b border-slate-50 pb-3 mb-3">
                                <div>
                                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-wider block">Customer Phone</span>
                                    <h4 class="font-extrabold text-slate-800 text-sm">${req.customer_phone}</h4>
                                    <p class="text-[9px] text-slate-400 font-bold mt-0.5">${new Date(req.created_at).toLocaleString()}</p>
                                </div>
                                <div>
                                    ${statusBadge}
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-3 bg-slate-50 p-3 rounded-xl text-xs">
                                <div>
                                    <span class="block text-[8px] font-bold text-slate-400 uppercase">Bank / Wallet</span>
                                    <span class="font-extrabold text-slate-700">${req.bank_name}</span>
                                </div>
                                <div>
                                    <span class="block text-[8px] font-bold text-slate-400 uppercase">Amount Request</span>
                                    <span class="font-black text-blue-600">Rs. ${req.amount}</span>
                                </div>
                                <div class="col-span-2 border-t border-slate-200/60 pt-1.5 flex justify-between items-center">
                                    <div>
                                        <span class="block text-[8px] font-bold text-slate-400 uppercase">Account Title</span>
                                        <span id="title_${req.id}" class="font-bold text-slate-700">${req.account_title}</span>
                                    </div>
                                    <button onclick="copyText('title_${req.id}')" class="text-[10px] text-blue-600 bg-blue-50 px-2 py-1 rounded-md hover:bg-blue-100 font-bold transition-all"><i class="fas fa-copy"></i> Copy</button>
                                </div>
                                <div class="col-span-2 border-t border-slate-200/60 pt-1.5 flex justify-between items-center">
                                    <div>
                                        <span class="block text-[8px] font-bold text-slate-400 uppercase">Account Number</span>
                                        <span id="num_${req.id}" class="font-extrabold text-slate-800 tracking-wider">${req.account_number}</span>
                                    </div>
                                    <button onclick="copyText('num_${req.id}')" class="text-[10px] text-blue-600 bg-blue-50 px-2 py-1 rounded-md hover:bg-blue-100 font-bold transition-all"><i class="fas fa-copy"></i> Copy</button>
                                </div>
                            </div>
                        </div>

                        ${actionArea}
                    </div>
                `;
            }).join('');
        }

        // Copy Feature
        function copyText(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("Copied: " + text);
            }).catch(err => console.error("Error copying text: ", err));
        }

        // Approve / Cancel Action Function
        async function processAction(id, action) {
            let refVal = "";
            let reasonVal = "";

            if (action === 'approved') {
                refVal = document.getElementById(`ref_${id}`).value.trim();
                if (!refVal) {
                    alert("Please fill the Bank Reference / Message details box first!");
                    return;
                }
            } else if (action === 'cancelled') {
                reasonVal = document.getElementById(`reason_${id}`).value.trim();
                if (!reasonVal) {
                    alert("Please provide a cancellation reason!");
                    return;
                }
            }

            if (!confirm(`Are you sure you want to change status to ${action.toUpperCase()}?`)) return;

            const updateData = {
                status: action,
                admin_reference: action === 'approved' ? refVal : null,
                cancel_reason: action === 'cancelled' ? reasonVal : null
            };

            try {
                const { error } = await _supabase
                    .from('withdraw_requests')
                    .update(updateData)
                    .eq('id', id);

                if (error) throw error;
                
                alert(`Request successfully ${action}!`);
                fetchRequests(); // Reload data across local layout
            } catch (err) {
                console.error("Operation Error:", err);
                alert("Something went wrong. Please check console logs.");
            }
        }

        // Realtime Tracker Setup
        function setupLiveSync() {
            _supabase.channel('admin-withdraw-channel')
                .on('postgres_changes', { 
                    event: '*', 
                    schema: 'public', 
                    table: 'withdraw_requests' 
                }, () => {
                    fetchRequests(); // Auto sync list data live
                }).subscribe();
        }

        window.onload = () => {
            fetchRequests();
            setupLiveSync();
        };
    </script>
</body>
</html>
