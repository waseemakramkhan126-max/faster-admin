<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Settings - Project Faster</title>
    <link rel="stylesheet" href="settings-style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <h2 class="brand-title">Admin Panel</h2>
            <nav>
                <a href="#" class="active">Settings</a>
                <a href="#">Orders</a>
                <a href="#">Riders</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <h1>Platform Settings</h1>
                <p>App ki basic configurations aur delivery areas manage karein.</p>
            </header>

            <div class="settings-grid">
                <section class="card">
                    <div class="card-header">
                        <h3>App Configurations</h3>
                    </div>
                    <div class="card-body">
                        <form id="appSettingsForm">
                            <div class="form-group">
                                <label for="logoUpload">App Logo (Branding)</label>
                                <div class="upload-wrapper">
                                    <img id="logoPreview" src="https://via.placeholder.com/150x50?text=No+Logo" alt="Logo Preview" class="logo-preview">
                                    <input type="file" id="logoUpload" accept="image/*">
                                    <button type="button" id="uploadLogoBtn" class="btn btn-secondary">Upload Logo</button>
                                </div>
                                <input type="hidden" id="logoUrlHidden">
                            </div>

                            <div class="form-group">
                                <label for="riderCommission">Rider Commission (%)</label>
                                <input type="number" id="riderCommission" step="0.01" placeholder="e.g. 15">
                            </div>

                            <div class="form-group">
                                <label for="deliveryTimer">Delivery Timer (Minutes)</label>
                                <input type="number" id="deliveryTimer" placeholder="e.g. 45">
                            </div>

                            <button type="submit" class="btn btn-primary" id="saveAppBtn">Save App Settings</button>
                        </form>
                    </div>
                </section>

                <section class="card">
                    <div class="card-header">
                        <h3>Add Delivery Area</h3>
                    </div>
                    <div class="card-body">
                        <form id="deliveryAreaForm">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="city">City</label>
                                    <input type="text" id="city" placeholder="e.g. Lahore" required>
                                </div>
                                <div class="form-group">
                                    <label for="areaName">Area Name</label>
                                    <input type="text" id="areaName" placeholder="e.g. Bahria Town" required>
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="deliveryFee">Customer Delivery Fee (Rs)</label>
                                    <input type="number" id="deliveryFee" required>
                                </div>
                                <div class="form-group toggle-group">
                                    <label for="isActive">Is Active?</label>
                                    <select id="isActive">
                                        <option value="true">Active (True)</option>
                                        <option value="false">Inactive (False)</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="openHour">Open Hour</label>
                                    <input type="time" id="openHour" required>
                                </div>
                                <div class="form-group">
                                    <label for="closeHour">Close Hour</label>
                                    <input type="time" id="closeHour" required>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary">Add / Save Area</button>
                        </form>
                    </div>
                </section>
            </div>

            <section class="card full-width">
                <div class="card-header">
                    <h3>Active Delivery Areas</h3>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="data-table">
                            <thead>
    <tr>
        <th>City</th>
        <th>Area</th>
        <th>Fee</th>
        <th>Timing</th>
        <th>Status</th>
        <th>Actions</th>
    </tr>
                            </thead>
                            <tbody id="areasTableBody">
                                </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    
    <script src="settings-logic.js"></script>
</body>
</html>
