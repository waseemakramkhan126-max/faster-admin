<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faster Admin | Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="settings-style.css">
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">
    
    <main class="max-w-5xl mx-auto p-6 md:p-10">
        
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Settings</h1>
            <p class="text-sm text-gray-500 mt-1">Manage your platform configurations, branding, and delivery areas.</p>
        </div>

        <div class="flex border-b border-gray-200 mb-8 overflow-x-auto hide-scrollbar">
            <button class="px-1 py-4 text-sm font-medium text-blue-600 border-b-2 border-blue-600 whitespace-nowrap mr-8">General</button>
            <button class="px-1 py-4 text-sm font-medium text-gray-500 hover:text-gray-700 whitespace-nowrap mr-8">Notifications</button>
            <button class="px-1 py-4 text-sm font-medium text-gray-500 hover:text-gray-700 whitespace-nowrap">Theme</button>
        </div>

        <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden mb-8">
            <div class="p-6 border-b border-gray-100 bg-gray-50/50">
                <h2 class="text-lg font-bold text-gray-900">App Configurations</h2>
            </div>
            <div class="p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Global Delivery Fee (Rs)</label>
                    <input type="number" id="feeInput" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="e.g. 150">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Rider Commission (%)</label>
                    <input type="number" id="commissionInput" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="e.g. 20">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Delivery Timer (Mins)</label>
                    <input type="number" id="timerInput" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="e.g. 45">
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden mb-8">
            <div class="p-6 border-b border-gray-100 bg-gray-50/50">
                <h2 class="text-lg font-bold text-gray-900">App Branding</h2>
            </div>
            <div class="p-6 flex items-center gap-6">
                <img id="logoPreview" src="https://via.placeholder.com/150" alt="App Logo" class="w-20 h-20 rounded-xl object-cover border border-gray-200">
                <div>
                    <input type="file" id="logoFileInput" accept="image/*" class="hidden">
                    <div class="flex gap-2 mb-2">
                        <button onclick="document.getElementById('logoFileInput').click()" class="px-4 py-2 bg-white border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
                            Choose File
                        </button>
                        <button id="uploadLogoBtn" class="px-4 py-2 bg-gray-100 text-gray-600 border border-transparent rounded-lg text-sm font-medium hover:bg-gray-200 transition-colors hidden">
                            Upload
                        </button>
                    </div>
                    <p id="uploadStatus" class="text-xs text-gray-500">PNG, JPG up to 2MB</p>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden mb-8">
            <div class="p-6 border-b border-gray-100 bg-gray-50/50 flex justify-between items-center">
                <div>
                    <h2 class="text-lg font-bold text-gray-900">Delivery Areas Control</h2>
                    <p class="text-sm text-gray-500 mt-1">Manage service status (ON/OFF) and specific timings for each area.</p>
                </div>
                <button onclick="fetchAdminAreas()" class="text-gray-500 hover:text-blue-600 transition" title="Refresh List">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
            <div class="p-6">
                <div id="adminAreasList" class="space-y-4">
                    <div class="text-center text-gray-400 py-6"><i class="fas fa-circle-notch fa-spin text-2xl mb-2"></i><br>Loading delivery areas...</div>
                </div>
            </div>
        </div>

        <div class="mt-6 flex justify-end gap-3 pb-10">
            <button id="resetBtn" onclick="window.location.reload()" class="px-5 py-2.5 bg-white border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
                Cancel / Refresh
            </button>
            <button id="saveBtn" class="px-5 py-2.5 bg-[#0f172a] text-white rounded-lg text-sm font-medium hover:bg-[#1e293b] shadow-sm transition-all flex items-center gap-2">
                <span>Save General Settings</span>
            </button>
        </div>

    </main>

    <script src="settings-logic.js"></script>
</body>
</html>
