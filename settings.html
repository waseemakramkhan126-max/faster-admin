<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faster Admin | System Config (Compact Dark)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        
        :root {
            --bg-color: #1a1c23;      
            --neo-dark: #121318;      
            --neo-light: #22252e;     
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-color); 
            color: #9ca3af; 
            overflow: hidden; 
        }

        /* NEOMORPHISM CLASSES */
        .neo-card {
            background: var(--bg-color);
            border-radius: 20px;
            box-shadow: 6px 6px 12px var(--neo-dark), -6px -6px 12px var(--neo-light);
            border: 1px solid rgba(255, 255, 255, 0.02);
        }
        
        .neo-inset {
            background: var(--bg-color);
            border-radius: 12px;
            box-shadow: inset 3px 3px 6px var(--neo-dark), inset -3px -3px 6px var(--neo-light);
        }

        /* GLASSMORPHISM */
        .glass-panel {
            background: rgba(26, 28, 35, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-header {
            background: rgba(26, 28, 35, 0.6);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .accent-glow { box-shadow: 0 0 15px rgba(34, 197, 94, 0.4); }
        .text-glow { color: white; text-shadow: 0 0 10px rgba(34, 197, 94, 0.5); }

        /* SIDEBAR MAGIC */
        .sidebar { width: 80px; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100; }
        .sidebar:hover { width: 250px; }
        .nav-text { opacity: 0; transform: translateX(-15px); transition: all 0.3s ease; white-space: nowrap; }
        .sidebar:hover .nav-text { opacity: 1; transform: translateX(0); }
        .nav-item:hover .nav-icon { color: #22c55e; transform: scale(1.1); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="flex h-screen w-full">

    <aside class="sidebar glass-panel h-full flex flex-col absolute lg:relative">
        <div class="h-16 flex items-center px-6 border-b border-gray-800 shrink-0">
            <div class="w-8 h-8 rounded-full flex items-center justify-center border border-green-500/30 shrink-0">
                <i class="fas fa-bolt text-green-500 drop-shadow-[0_0_5px_rgba(34,197,94,0.8)]"></i>
            </div>
            <h1 class="nav-text text-base font-black text-white tracking-widest uppercase ml-4">Faster<span class="text-green-500">.</span></h1>
        </div>
        
        <nav class="flex-1 overflow-y-auto py-4 space-y-1 overflow-x-hidden">
            <a href="index.html" class="nav-item flex items-center px-6 py-3 text-gray-400 hover:bg-gray-800/40 transition-colors border-l-4 border-transparent hover:border-green-500">
                <i class="nav-icon fas fa-home w-8 text-center text-lg transition-all"></i>
                <span class="nav-text font-black text-[10px] uppercase tracking-widest ml-4">Main Hub</span>
            </a>
            <a href="dashboard.html" class="nav-item flex items-center px-6 py-3 text-gray-400 hover:bg-gray-800/40 transition-colors border-l-4 border-transparent hover:border-green-500">
                <i class="nav-icon fas fa-chart-pie w-8 text-center text-lg transition-all"></i>
                <span class="nav-text font-black text-[10px] uppercase tracking-widest ml-4">Dashboard</span>
            </a>
            <a href="orders.html" class="nav-item flex items-center px-6 py-3 text-gray-400 hover:bg-gray-800/40 transition-colors border-l-4 border-transparent hover:border-green-500">
                <i class="nav-icon fas fa-box-open w-8 text-center text-lg transition-all"></i>
                <span class="nav-text font-black text-[10px] uppercase tracking-widest ml-4">Orders</span>
            </a>
            <a href="promotions.html" class="nav-item flex items-center px-6 py-3 text-gray-400 hover:bg-gray-800/40 transition-colors border-l-4 border-transparent hover:border-green-500">
                <i class="nav-icon fas fa-ad w-8 text-center text-lg transition-all"></i>
                <span class="nav-text font-black text-[10px] uppercase tracking-widest ml-4">Promotions</span>
            </a>
            <a href="settings.html" class="nav-item flex items-center px-6 py-3 text-green-500 bg-green-500/5 border-l-4 border-green-500">
                <i class="nav-icon fas fa-cogs w-8 text-center text-lg transition-all drop-shadow-[0_0_8px_rgba(34,197,94,0.5)]"></i>
                <span class="nav-text font-black text-[10px] uppercase tracking-widest ml-4 flex items-center justify-between w-full">
                    Settings <span class="bg-green-500 text-black text-[8px] px-2 py-0.5 rounded-full ml-4">ACTIVE</span>
                </span>
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-green-900/10 via-[#1a1c23] to-[#1a1c23] relative lg:ml-0 ml-20">
        
        <header class="h-16 px-6 flex justify-between items-center glass-header z-40 shrink-0">
            <div>
                <h2 class="text-white font-black text-sm tracking-widest uppercase text-glow">System Configuration</h2>
            </div>
            <button onclick="saveAllSettings()" id="saveBtn" class="bg-green-500 text-[#1a1c23] px-5 py-2 rounded-lg font-black text-[10px] uppercase tracking-widest hover:bg-green-400 transition-colors accent-glow flex items-center gap-2">
                <i class="fas fa-save"></i> Save Settings
            </button>
        </header>

        <div class="flex-1 p-6 overflow-y-auto">
            <div class="max-w-5xl mx-auto">
                
                <div class="grid grid-cols-1 xl:grid-cols-3 gap-5 pb-6">
                    
                    <div class="xl:col-span-2 space-y-5">
                        
                        <div class="neo-card p-6 relative overflow-hidden">
                            <i class="fas fa-money-bill-wave absolute -right-2 -top-2 text-6xl text-white/5 rotate-12"></i>
                            <h3 class="text-xs font-black text-white mb-4 uppercase tracking-widest flex items-center gap-2">
                                <i class="fas fa-coins text-green-500"></i> Pricing Engine
                            </h3>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 relative z-10">
                                <div>
                                    <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest block mb-1.5">Customer Delivery Fee</label>
                                    <div class="relative">
                                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-green-500 font-black text-[10px]">PKR</span>
                                        <input type="number" id="setCustFee" class="w-full neo-inset p-2.5 pl-12 font-black text-sm text-white border border-transparent outline-none focus:border-green-500/50 transition-colors bg-transparent placeholder-gray-700">
                                    </div>
                                </div>
                                <div>
                                    <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest block mb-1.5">Rider Commission</label>
                                    <div class="relative">
                                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-green-500 font-black text-[10px]">PKR</span>
                                        <input type="number" id="setRiderFee" class="w-full neo-inset p-2.5 pl-12 font-black text-sm text-white border border-transparent outline-none focus:border-green-500/50 transition-colors bg-transparent placeholder-gray-700">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="neo-card p-6">
                            <h3 class="text-xs font-black text-white mb-4 uppercase tracking-widest flex items-center gap-2">
                                <i class="fas fa-bullhorn text-green-500"></i> Global Popup Message
                            </h3>
                            <textarea id="setPopupMsg" class="w-full neo-inset p-3 h-24 font-bold text-xs text-gray-300 border border-transparent outline-none focus:border-green-500/50 transition-colors bg-transparent placeholder-gray-700" placeholder="Enter app startup message..."></textarea>
                            <p class="text-[9px] text-gray-500 mt-2 font-bold uppercase tracking-widest"><i class="fas fa-info-circle text-green-500 mr-1"></i> Shown to users on app launch</p>
                        </div>
                    </div>

                    <div class="space-y-5">
                        
                        <div class="neo-card p-6 text-center flex flex-col items-center justify-center">
                            <h3 class="text-xs font-black text-white mb-4 uppercase tracking-widest">App Branding</h3>
                            
                            <div class="relative inline-block group mb-4">
                                <div class="neo-inset p-2 rounded-2xl border border-gray-800 w-24 h-24 flex items-center justify-center bg-[#121318]">
                                    <img id="currentLogoPreview" src="" class="w-full h-full object-contain rounded-lg opacity-90 group-hover:opacity-100 transition-opacity">
                                </div>
                                <label for="logoFile" class="absolute -bottom-2 -right-2 bg-green-500 text-[#1a1c23] w-8 h-8 rounded-lg flex items-center justify-center cursor-pointer shadow-[0_0_10px_rgba(34,197,94,0.5)] hover:bg-green-400 transition">
                                    <i class="fas fa-pen text-[10px] font-black"></i>
                                </label>
                            </div>
                            
                            <input type="file" id="logoFile" accept="image/*" class="hidden">
                            <button onclick="uploadLogo()" id="logoBtn" class="w-full neo-inset border border-gray-800 text-gray-400 hover:text-green-500 py-2.5 rounded-lg font-black text-[9px] uppercase tracking-widest transition-colors flex items-center justify-center gap-2">
                                <i class="fas fa-cloud-upload-alt"></i> Upload New Logo
                            </button>
                        </div>

                        <div class="neo-card p-6 text-center relative overflow-hidden group border-t border-green-500/30">
                            <div class="absolute inset-0 bg-green-500/5 group-hover:bg-green-500/10 transition-colors"></div>
                            <div class="relative z-10">
                                <h3 class="text-[9px] font-black text-green-500 uppercase tracking-widest mb-3">Delivery Target</h3>
                                <div class="flex items-end justify-center gap-2">
                                    <input type="number" id="deliveryTimer" class="bg-transparent w-20 text-4xl font-black text-white outline-none text-center neo-inset py-2 border border-gray-800 focus:border-green-500/50">
                                    <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">MINS</span>
                                </div>
                            </div>
                            <i class="fas fa-stopwatch absolute -right-4 -bottom-4 text-7xl text-white/5 group-hover:rotate-12 transition-transform duration-700"></i>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = "https://hfaghazbwdbjurachzzq.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhmYWdoYXpid2RianVyYWNoenpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4ODQ1ODAsImV4cCI6MjA4NjQ2MDU4MH0.ojmtP9i_wO74CuvDUgI--lhocsfqcB_Lql_hC2w8UMI";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function loadSettings() {
            const { data, error } = await _supabase.from('app_settings').select('*').eq('id', 1).single();
            if (data) {
                document.getElementById('deliveryTimer').value = data.delivery_timer || 30;
                document.getElementById('setCustFee').value = data.customer_delivery_fee || 0;
                document.getElementById('setRiderFee').value = data.rider_commission || 0;
                document.getElementById('setPopupMsg').value = data.delivery_popup_message || "";
                document.getElementById('currentLogoPreview').src = data.logo_url || "https://via.placeholder.com/150";
            }
        }

        async function uploadLogo() {
            const fileInput = document.getElementById('logoFile');
            if (!fileInput.files[0]) return alert("Please select an image first!");
            const btn = document.getElementById('logoBtn');
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> WAIT...`;
            
            const file = fileInput.files[0];
            const name = `logo_${Date.now()}.png`;
            try {
                const { data, error } = await _supabase.storage.from('branding').upload(name, file);
                if (error) throw error;
                const { data: url } = _supabase.storage.from('branding').getPublicUrl(name);
                await _supabase.from('app_settings').update({ logo_url: url.publicUrl }).eq('id', 1);
                alert("Logo Updated!"); location.reload();
            } catch (error) {
                alert(error.message);
                btn.innerHTML = `<i class="fas fa-cloud-upload-alt"></i> Upload New Logo`;
            }
        }

        async function saveAllSettings() {
            const btn = document.getElementById('saveBtn');
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Saving...`;
            
            try {
                const updates = {
                    delivery_timer: parseInt(document.getElementById('deliveryTimer').value),
                    customer_delivery_fee: parseFloat(document.getElementById('setCustFee').value),
                    rider_commission: parseFloat(document.getElementById('setRiderFee').value),
                    delivery_popup_message: document.getElementById('setPopupMsg').value
                };
                const { error } = await _supabase.from('app_settings').update(updates).eq('id', 1);
                if (error) throw error;
                alert("Settings Saved! ✅");
            } catch (error) {
                alert(error.message);
            } finally {
                btn.innerHTML = `<i class="fas fa-save"></i> Save Settings`;
                loadSettings();
            }
        }
        window.onload = loadSettings;
    </script>
</body>
</html>
