<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faster Admin | Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="settings-style.css">
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">
    <main class="max-w-5xl mx-auto p-6 md:p-10">
        <h1 class="text-3xl font-bold mb-8">Settings</h1>

        <div class="bg-white p-6 rounded-2xl border mb-8">
            <h2 class="text-lg font-bold mb-4">App Configurations</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <input type="number" id="feeInput" placeholder="Delivery Fee" class="p-2 border rounded-lg w-full">
                <input type="number" id="commissionInput" placeholder="Commission %" class="p-2 border rounded-lg w-full">
                <input type="number" id="timerInput" placeholder="Timer Mins" class="p-2 border rounded-lg w-full">
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl border mb-8">
            <h2 class="text-lg font-bold mb-4">Delivery Areas Control</h2>
            <div id="adminAreasList" class="space-y-4">
                <div class="text-gray-400">Loading areas...</div>
            </div>
        </div>

        <button id="saveBtn" class="bg-black text-white px-6 py-3 rounded-lg">Save All Settings</button>
    </main>
    <script src="settings-logic.js"></script>
</body>
</html>
